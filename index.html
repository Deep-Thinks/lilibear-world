<!-- 强制声明 Referrer-Policy: 解决微信内嵌浏览器 (X5/XWEB) 不发 Referer 导致
     高德 vdata.amap.com/mapclick 鉴权空响应、SDK 抛 INVALID_USER_DOMAIN 的问题。
     origin-when-cross-origin 对跨域只发 origin (https://world.xmu-cuisine.club)，
     既能让高德通过校验，又不会泄露具体路径。-->

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="栗栗熊环游世界 · 厦门大学美食协会">
<meta name="twitter:description" content="点一个地方，AI 让栗栗熊去吃遍那里的美食 🌍">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E🐼%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --paper:    #fbf3e4;
    --paper-2:  #f3e7cf;
    --paper-3:  #ecdcb8;
    --ink:      #4a342a;
    --ink-soft: #8a6a55;
    --accent:   #d8593a;
    --accent-2: #b8451f;
    --leaf:     #6f9b5a;
    --sky:      #d9ebe8;
    --shadow:   rgba(80, 50, 30, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
  }
  /* —— 顶栏 —— */
  header {
    position: fixed; inset: 0 0 auto 0; z-index: 10;
    padding: 18px 28px 14px;
    display: flex; align-items: center; gap: 18px;
    background: linear-gradient(to bottom, rgba(251, 243, 228, 0.92), rgba(251, 243, 228, 0));
    pointer-events: none;
  }
  /* logo: 去掉米色圆底，直接出小熊猫；用 drop-shadow 给手绘感投影，
     避免「圆框包方图」的天圆地方观感 */
  header .logo-wrap {
    position: relative;
    width: 96px; height: 96px;
    flex-shrink: 0;
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(3px 3px 0 var(--ink)) drop-shadow(0 2px 4px var(--shadow));
    transition: transform .2s ease;
  }
  header .logo-wrap:hover { transform: translateY(-2px) rotate(-3deg); }
  header .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  header h1 {
    font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', sans-serif;
    font-size: 32px; font-weight: 400;
    letter-spacing: 2px;
    color: var(--accent-2);
    text-shadow: 2px 2px 0 var(--paper-2);
    line-height: 1;
  }
  header .sub {
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 14px; color: var(--ink-soft);
    margin-top: 5px;
  }
  /* —— 角标 —— */
  .badge {
    position: fixed; bottom: 18px; left: 24px; z-index: 10;
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 13px; color: var(--ink-soft);
    background: rgba(251, 243, 228, 0.85);
    padding: 8px 14px;
    border-radius: 20px;
    border: 1.5px dashed var(--ink-soft);
  }
  /* —— 地图容器 —— */
  #globe {
    position: absolute; inset: 0;
    background: var(--paper);
  }
  /* —— 引导提示气泡 —— */
  .hint {
    position: fixed;
    left: 50%; bottom: 32px; transform: translateX(-50%);
    z-index: 10;
    padding: 12px 22px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 28px;
    box-shadow: 3px 3px 0 var(--ink);
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 16px;
    color: var(--ink);
    animation: bob 2.2s ease-in-out infinite;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
  }
  .hint.hidden { opacity: 0; }
  .hint.busy { border-color: var(--accent); color: var(--accent-2); }
  .hint::after {
    content: ''; position: absolute;
    left: 50%; bottom: -10px; transform: translateX(-50%);
    width: 16px; height: 16px;
    background: #fff;
    border-right: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    rotate: 45deg;
  }
  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-6px); }
  }
  /* —— 右侧抽屉 —— */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(38vw, 460px);
    background: var(--paper);
    border-left: 3px solid var(--ink);
    box-shadow: -6px 0 0 var(--shadow);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(.4,1.4,.5,1);
    z-index: 20;
    display: flex; flex-direction: column;
  }
  #panel.open { transform: translateX(0); }
  #panel-head {
    padding: 16px 20px;
    border-bottom: 2px dashed var(--ink-soft);
    display: flex; align-items: center; gap: 12px;
  }
  #panel-head .where {
    flex: 1;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 18px; color: var(--accent-2);
    line-height: 1.3;
  }
  #panel-head .where small {
    display: block;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px; color: var(--ink-soft);
    font-weight: 400;
    margin-top: 2px;
  }
  #panel button.icon {
    background: transparent;
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 18px;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
  }
  #panel button.icon:hover { background: var(--ink); color: var(--paper); }
  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px 24px;
  }
  #panel-body::-webkit-scrollbar { width: 8px; }
  #panel-body::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 4px; }

  /* —— 确认卡片 —— */
  .confirm-card { text-align: center; padding: 24px 8px 8px; }
  .confirm-card .mascot {
    width: 110px; height: 110px;
    margin: 0 auto 14px;
    filter: drop-shadow(3px 3px 0 var(--ink)) drop-shadow(0 2px 4px var(--shadow));
    animation: wave 2s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-card .mascot img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  @keyframes wave {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }
  .confirm-card .ask {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  /* 旧的扁平 .latlng（结果页/loading 还在用），保留为兜底 */
  .confirm-card .latlng {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent-2);
    margin-bottom: 4px;
  }
  /* 新的两行层级：地名（大字手写）+ 坐标（mono 灰小字） */
  .confirm-card .place-name {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 22px;
    color: var(--accent-2);
    line-height: 1.25;
    margin-bottom: 2px;
    /* 反查中态的半透明灰 */
    transition: color 0.25s, opacity 0.25s;
  }
  .confirm-card .place-name.resolving {
    color: var(--ink-soft);
    opacity: 0.75;
  }
  .confirm-card .place-name.unresolved {
    color: var(--ink-soft);
    font-size: 17px;  /* 兜底文案小一点，让坐标承担主信息 */
  }
  .confirm-card .coord-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  /* 当地名兜底失败时，坐标升级为主信息 */
  .confirm-card .place-name.unresolved + .coord-detail {
    font-size: 14px;
    color: var(--ink);
  }
  .confirm-card .note {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  /* 预期等待提示 —— 比 .note 重，但不抢主标题的戏 */
  .confirm-card .eta {
    display: inline-block;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--paper-2);
    border: 1.5px dashed var(--ink-soft);
    border-radius: 16px;
    padding: 6px 14px;
    margin-bottom: 16px;
  }
  .confirm-card .btn-row {
    display: flex; flex-direction: column; gap: 10px;
    padding: 0 4px;
  }
  .btn {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 16px;
    padding: 12px 22px;
    border-radius: 28px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2.5px solid var(--ink);
    letter-spacing: 1px;
  }
  .btn[disabled] { opacity: .55; cursor: not-allowed; }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn.primary:hover:not([disabled]) {
    background: var(--accent-2);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .btn.primary:active:not([disabled]) {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
  }
  .btn.ghost:hover:not([disabled]) { background: var(--paper-2); }

  /* —— loading 状态 —— */
  .loading-card { text-align: center; padding: 36px 16px; }
  .loading-card .mascot {
    width: 90px; height: 90px;
    margin: 0 auto 18px;
    filter: drop-shadow(3px 3px 0 var(--ink)) drop-shadow(0 2px 4px var(--shadow));
    animation: spin-bob 1.5s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
  }
  .loading-card .mascot img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  @keyframes spin-bob {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-6px) rotate(5deg); }
  }
  .loading-card .quip {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 17px; color: var(--ink);
    margin-bottom: 6px;
    transition: opacity 0.3s;
    min-height: 24px;  /* 防止文案切换时高度抖动 */
  }
  .loading-card .quip.fading { opacity: 0.3; }
  .loading-card .sub-quip {
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 14px;
    min-height: 20px;
  }
  .loading-card .timer { font-size: 12px; color: var(--ink-soft); }
  .loading-card .dots::after {
    content: '...';
    animation: dotloop 1.5s steps(4, end) infinite;
  }
  @keyframes dotloop {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
  /* —— Loading 期间的「上次画过的」预览 —— */
  .loading-peek {
    margin-top: 18px;
    padding: 12px;
    background: var(--paper-2);
    border: 1.5px dashed var(--ink-soft);
    border-radius: 10px;
    text-align: left;
    display: flex; gap: 10px; align-items: center;
  }
  .loading-peek .peek-thumb {
    flex-shrink: 0;
    width: 48px; height: 64px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    background: var(--paper) center/cover no-repeat;
    overflow: hidden;
  }
  .loading-peek .peek-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .loading-peek .peek-text {
    flex: 1; min-width: 0;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink-soft);
  }
  .loading-peek .peek-text .peek-label {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .loading-peek .peek-text .peek-place {
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  /* 超时取消按钮，仅在 > 360s 后出现 */
  .loading-card .cancel-hint {
    margin-top: 14px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .loading-card .cancel-hint a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
    cursor: pointer;
  }
  /* —— 结果图 —— */
  .result-img {
    width: 100%;
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    box-shadow: 4px 4px 0 var(--shadow);
    display: block;
    background: var(--paper-2);
  }
  .result-meta {
    margin-top: 14px;
    font-size: 12px; color: var(--ink-soft);
    text-align: center;
    line-height: 1.7;
  }
  .result-meta a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }
  /* 完成态三按钮 CTA：用户处于"我刚画完"高峰情绪，给三个出口避免直接关页面 */
  .share-cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 16px 0 4px;
    justify-content: center;
  }
  .share-cta {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 14px;
    padding: 9px 16px;
    border-radius: 22px;
    background: #fff;
    color: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-block;
    line-height: 1.2;
  }
  .share-cta:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .share-cta:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .share-cta.primary {
    background: var(--accent);
    color: #fff;
  }
  .share-cta.primary:hover {
    background: var(--accent-2);
  }
  .err {
    padding: 16px;
    background: rgba(216, 89, 58, 0.08);
    border: 2px solid var(--accent);
    border-radius: 6px;
    font-size: 13px;
    color: var(--accent-2);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* —— 机票夹 —— */
  .trips-empty {
    text-align: center; padding: 30px 8px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .trip-card {
    display: flex; gap: 12px;
    padding: 10px;
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 10px;
    box-shadow: 2px 2px 0 var(--shadow);
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .12s;
  }
  .trip-card:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--shadow); }
  .trip-card .thumb {
    flex-shrink: 0;
    width: 60px; height: 80px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    background: var(--paper) center/cover no-repeat;
    overflow: hidden;
  }
  .trip-card .thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .trip-card .meta {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; justify-content: center;
    font-size: 12px; color: var(--ink-soft); line-height: 1.5;
  }
  .trip-card .meta .latlng {
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .trip-card .meta .when { font-size: 11px; }
  .trip-card .del {
    background: none; border: none; cursor: pointer;
    color: var(--ink-soft); font-size: 18px;
    padding: 0 4px; align-self: flex-start;
  }
  .trip-card .del:hover { color: var(--accent); }

  /* —— 机票夹/全球墙 tab 切换 —— */
  .trips-tabs {
    display: flex; gap: 6px; margin: -4px 0 14px;
    border-bottom: 2px solid var(--ink-soft);
  }
  .trips-tab {
    flex: 1;
    background: none; border: none; border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    padding: 8px 6px;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 14px; color: var(--ink-soft);
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .trips-tab:hover { color: var(--ink); }
  .trips-tab.active { color: var(--accent-2); border-bottom-color: var(--accent-2); }

  /* —— 全球墙网格 —— */
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .feed-card {
    display: flex; flex-direction: column;
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 10px;
    box-shadow: 2px 2px 0 var(--shadow);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: transform .12s;
  }
  .feed-card:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--shadow); }
  .feed-card .thumb {
    width: 100%;
    aspect-ratio: 1 / 2;
    background: var(--paper);
    overflow: hidden;
    border-bottom: 1.5px solid var(--ink);
  }
  .feed-card .thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .feed-card .feed-meta {
    padding: 6px 8px 8px;
    font-size: 11px; color: var(--ink-soft); line-height: 1.5;
  }
  .feed-card .feed-place {
    color: var(--accent-2);
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .feed-card .feed-author { font-size: 11px; }
  .feed-card .feed-when { font-size: 10px; opacity: 0.7; }
  .feed-card .feed-private {
    position: absolute; top: 6px; right: 6px;
    font-size: 10px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .feed-loadmore-row { text-align: center; padding: 16px 0 8px; }
  .feed-loadmore {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 14px;
    padding: 8px 22px;
    border-radius: 18px;
    background: #fff;
    color: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer;
  }
  .feed-loadmore:hover { background: var(--accent); color: #fff; }
  .feed-loading, .feed-end, .feed-err { font-size: 12px; color: var(--ink-soft); padding: 8px 0; }
  .feed-err { color: #c0392b; cursor: pointer; }

  @media (max-width: 640px) {
    .feed-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .feed-card .feed-place { font-size: 13px; }
  }

  /* —— pending pin —— */
  .pin-pending {
    width: 22px; height: 22px;
    border: 3px solid var(--accent);
    background: rgba(255, 255, 255, 0.7);
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(216, 89, 58, 0.2);
    animation: ping 1.4s ease-in-out infinite;
    transform: translate(-50%, -50%);
  }
  /* .pin-done 已被 .pin-photo 替代（缩略图直接贴在地图对应经纬度）。
     保留这条 CSS 可能误导，删除。 */
  .pin-home {
    width: 26px; height: 26px;
    background: var(--leaf);
    border: 3px solid var(--ink);
    border-radius: 50%;
    box-shadow: 2px 2px 0 var(--ink);
    transform: translate(-50%, -50%);
    position: relative;
  }
  .pin-home::after {
    content: '家';
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 13px;
  }
  @keyframes ping {
    0%, 100% { box-shadow: 0 0 0 4px rgba(216, 89, 58, 0.2); }
    50%      { box-shadow: 0 0 0 12px rgba(216, 89, 58, 0); }
  }
  /* —— 加载遮罩 —— */
  #boot {
    position: fixed; inset: 0;
    background: var(--paper);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px;
    transition: opacity 0.6s;
  }
  #boot.gone { opacity: 0; pointer-events: none; }
  #boot .boot-mascot {
    width: 140px; height: 140px;
    filter: drop-shadow(3px 3px 0 var(--ink)) drop-shadow(0 4px 8px var(--shadow));
    animation: spin-bob 1.5s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
  }
  #boot .boot-mascot img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  #boot .boot-text {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 18px;
    color: var(--accent-2);
  }
  /* —— 顶部右侧工具条：view-switch / trips-btn / search 全在此容器 —— */
  /* 桌面端 flex 横排 + 等高对齐；移动端整体右上角，子项缩小 */
  .toolbar {
    position: fixed;
    top: 110px; right: 18px;
    z-index: 10;
    display: flex;
    align-items: stretch;  /* 子项等高 */
    gap: 10px;
  }

  /* 统一外壳：所有 .toolbar-item 子项共用纸质胶囊样式
     这是关键的"复用"——桌面/移动端高度一致、风格一致 */
  .toolbar-item {
    background: rgba(251, 243, 228, 0.95);
    border: 2px solid var(--ink);
    border-radius: 12px;
    box-shadow: 3px 3px 0 var(--shadow);
    height: 40px;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px;
    color: var(--ink);
    padding: 0;
    transition: box-shadow 0.12s, transform 0.12s;
  }

  /* —— view-switch（2D/3D/卫星）—— */
  .view-switch {
    padding: 3px;
    gap: 2px;
  }
  .view-switch button {
    font-family: inherit;
    font-size: 13px;
    padding: 0 12px;
    border: none;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
    display: flex; align-items: center;
  }
  .view-switch button.active {
    background: var(--accent);
    color: #fff;
  }

  /* —— trips-btn —— */
  .trips-btn {
    padding: 0 14px;
    font-size: 14px;
    cursor: pointer;
    gap: 6px;
    align-items: center;
  }
  .trips-btn:hover {
    background: var(--paper-2);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--shadow);
  }
  .trips-btn .count {
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 12px;
    min-width: 18px;
    text-align: center;
    align-self: center;
  }

  /* —— layer-toggle（地球仪上「全球足迹」散点图层开关）—— */
  /* on 态用 accent 实心，让用户一眼看出散点正在显示 */
  .layer-toggle {
    padding: 0 13px;
    font-size: 14px;
    cursor: pointer;
    gap: 6px;
    align-items: center;
  }
  .layer-toggle:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--shadow);
  }
  .layer-toggle.on {
    background: var(--accent);
    color: #fff;
  }
  .layer-toggle .lt-icon { font-size: 15px; }

  /* —— search-box（桌面输入框；移动端默认隐藏，由 mobile-search-btn 替代）—— */
  .search-box:focus-within { box-shadow: 4px 4px 0 var(--ink); }
  .search-box input {
    border: none;
    background: transparent;
    padding: 0 12px;
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 14px;
    color: var(--ink);
    width: 220px;
    outline: none;
  }
  .search-box input::placeholder {
    color: var(--ink-soft);
    font-family: 'Ma Shan Zheng', sans-serif;
  }
  .search-box .search-go {
    border: none;
    background: transparent;
    border-left: 1.5px solid var(--ink);
    padding: 0 12px;
    cursor: pointer;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 14px;
    color: var(--ink);
    transition: background 0.12s;
    display: flex; align-items: center;
  }
  .search-box .search-go:hover { background: var(--paper-2); }
  .search-box .search-go:active { background: var(--paper-3); }
  .search-box .search-go.searching {
    color: var(--ink-soft);
    pointer-events: none;
  }

  /* —— mobile-search-btn（桌面端隐藏；移动端等高方形按钮） —— */
  .mobile-search-btn {
    display: none;
    width: 40px;
    cursor: pointer;
    font-size: 18px;
    padding: 0;
    align-items: center;
    justify-content: center;
  }
  .mobile-search-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--shadow);
  }

  /* 移动端搜索展开时的遮罩 */
  .search-veil {
    position: fixed; inset: 0;
    background: rgba(74, 52, 42, 0.42);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    z-index: 49;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  body.mobile-search-open .search-veil {
    opacity: 1;
    pointer-events: auto;
  }

  /* 错误提示气泡（搜不到时）：贴在 toolbar 正下方右侧 */
  .search-error {
    position: fixed;
    top: 158px;   /* toolbar.top (110) + toolbar.height (40) + 8 */
    right: 18px;
    z-index: 11;
    background: #fff;
    border: 2px solid var(--accent);
    border-radius: 10px;
    box-shadow: 3px 3px 0 var(--shadow);
    padding: 8px 14px;
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 13px;
    color: var(--accent-2);
    max-width: 340px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .search-error.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  /* —— "已去过"地图标记：polaroid 风格缩略图，直接贴在地图对应经纬度 —— */
  /* 取代屏幕四角散落的 #scattered-trips 方案：贴在地图对应位置才有"环游世界"的故事意义 */
  .pin-photo {
    width: 48px;
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.4,1.4,.5,1);
    /* 每个 marker 实例通过 inline style 设随机倾斜 */
  }
  .pin-photo:hover {
    transform: rotate(0deg) translate(-2px, -2px) scale(1.18) !important;
    z-index: 200 !important;
  }
  .pin-photo .pp-thumb {
    width: 48px; height: 60px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 3px;
    box-shadow: 2px 2px 0 var(--ink), 3px 3px 0 var(--shadow);
    overflow: hidden;
    padding: 2px 2px 8px;  /* polaroid 下边宽 */
  }
  .pin-photo .pp-thumb .pp-inner {
    width: 100%; height: 100%;
    background: var(--paper-2) center/cover no-repeat;
    overflow: hidden;
  }
  .pin-photo .pp-thumb .pp-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  /* hover 时显示地名 tooltip（CSS 纯实现，不依赖 AMap InfoWindow） */
  .pin-photo .pp-label {
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%) rotate(0deg);  /* tooltip 不跟着倾斜 */
    background: var(--ink);
    color: var(--paper);
    font-family: 'Ma Shan Zheng', sans-serif;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
    box-shadow: 2px 2px 0 var(--shadow);
  }
  .pin-photo:hover .pp-label { opacity: 1; }

  /* —— 全球墙：所有公开点（小圆点，区别个人 polaroid） —— */
  /* 切到「🌍 全球墙」tab 时显示，让用户立刻感觉栗栗熊遍布全球 */
  .pin-public {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(232, 119, 34, 0.85);                /* 橙色（个人是棕色 polaroid） */
    border: 1.5px solid rgba(255, 255, 255, 0.92);
    box-shadow: 0 0 8px rgba(232, 119, 34, 0.55), 0 1px 2px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .pin-public:hover {
    transform: scale(1.6);
  }
  .pin-public.is-mine {
    /* 自己的图也会出现在公开层；用更深色避免和别人的视觉抢戏 */
    background: rgba(120, 80, 30, 0.85);
    box-shadow: 0 0 6px rgba(120, 80, 30, 0.4), 0 1px 2px rgba(0,0,0,0.2);
  }

  /* —— 首次访问欢迎气泡 —— */
  /* 显示一次 (localStorage 记忆)，让访客先看到栗栗熊是谁、怎么玩 */
  #welcome-bubble {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    z-index: 30;
    width: min(440px, calc(100vw - 40px));
    padding: 24px 26px 22px;
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 18px;
    box-shadow: 5px 5px 0 var(--ink), 10px 10px 0 var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.4,1.4,.5,1);
    text-align: center;
  }
  #welcome-bubble.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  #welcome-bubble.gone {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.96) translateY(8px);
    pointer-events: none;
  }
  #welcome-bubble .wb-mascot {
    width: 72px; height: 72px;
    margin: -54px auto 8px;
    filter: drop-shadow(3px 3px 0 var(--ink)) drop-shadow(0 2px 4px var(--shadow));
    background: #fff;
    border-radius: 50%;
    padding: 4px;
  }
  #welcome-bubble .wb-mascot img {
    width: 100%; height: 100%; object-fit: contain; display: block;
  }
  #welcome-bubble .wb-title {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 22px;
    color: var(--accent-2);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  #welcome-bubble .wb-body {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 6px;
  }
  #welcome-bubble .wb-body em {
    font-style: normal;
    font-family: 'Ma Shan Zheng', sans-serif;
    color: var(--accent-2);
    font-size: 15px;
  }
  #welcome-bubble .wb-note {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  /* 社会证明 chip：让新人立刻感觉这是个"已经有人在玩"的活地方，而不是空荡荡的实验品 */
  #welcome-bubble .wb-stat {
    display: inline-block;
    font-size: 13px;
    color: var(--accent-2);
    background: #fff8ef;
    border: 1.5px dashed var(--accent);
    border-radius: 14px;
    padding: 6px 12px;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  #welcome-bubble .wb-stat em {
    font-style: normal;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 16px;
    color: var(--accent);
    padding: 0 2px;
  }
  #welcome-bubble .wb-btn {
    display: inline-block;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 16px;
    padding: 10px 26px;
    border-radius: 24px;
    background: var(--accent);
    color: #fff;
    border: 2.5px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  #welcome-bubble .wb-btn:hover {
    background: var(--accent-2);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--ink);
  }
  #welcome-bubble .wb-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  /* 半透明纸质背景，仅在欢迎气泡可见时 */
  #welcome-veil {
    position: fixed; inset: 0;
    background: rgba(251, 243, 228, 0.7);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 29;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }
  #welcome-veil.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* —— 昵称弹窗（复用 welcome-bubble 的核心外观） —— */
  #nick-bubble {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    z-index: 31;
    width: min(420px, calc(100vw - 40px));
    padding: 24px 26px 22px;
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 18px;
    box-shadow: 5px 5px 0 var(--ink), 10px 10px 0 var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(.4,1.4,.5,1);
    text-align: center;
  }
  #nick-bubble.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
  #nick-bubble .wb-mascot { width: 64px; height: 64px; margin: -48px auto 6px; filter: drop-shadow(3px 3px 0 var(--ink)); background: #fff; border-radius: 50%; padding: 4px; }
  #nick-bubble .wb-mascot img { width: 100%; height: 100%; object-fit: contain; display: block; }
  #nick-bubble .wb-title { font-family: 'ZCOOL KuaiLe', sans-serif; font-size: 20px; color: var(--accent-2); margin-bottom: 8px; }
  #nick-bubble .wb-body { font-size: 14px; color: var(--ink); line-height: 1.7; margin-bottom: 14px; }
  #nick-bubble .wb-body em { font-style: normal; font-family: 'Ma Shan Zheng', sans-serif; color: var(--accent-2); font-size: 15px; }
  #nick-bubble .nick-input-row { margin: 0 0 6px; }
  #nick-bubble #nick-input {
    width: 100%;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 16px;
    color: var(--ink);
    background: #fdfbf6;
    border: 2px solid var(--ink);
    border-radius: 12px;
    outline: none;
    box-sizing: border-box;
  }
  #nick-bubble #nick-input:focus { border-color: var(--accent-2); background: #fff; }
  #nick-bubble .nick-err { min-height: 18px; font-size: 12px; color: #c0392b; margin-bottom: 8px; }
  #nick-bubble .nick-btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  #nick-bubble .wb-btn { font-family: 'ZCOOL KuaiLe', sans-serif; font-size: 15px; padding: 9px 18px; border-radius: 22px; background: #fff; color: var(--ink); border: 2px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); cursor: pointer; }
  #nick-bubble .wb-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
  #nick-bubble .wb-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  #nick-bubble .nick-btn-primary { background: var(--accent); color: #fff; }
  #nick-bubble .nick-btn-primary:hover { background: var(--accent-2); }
  #nick-veil { position: fixed; inset: 0; background: rgba(251, 243, 228, 0.7); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #nick-veil.visible { opacity: 1; pointer-events: auto; }

  /* 确认面板的"上传到全球墙"开关 */
  .feed-toggle-row { margin: 10px 0 4px; text-align: center; }
  .feed-toggle-label { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); cursor: pointer; user-select: none; }
  .feed-toggle-label input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

  /* —— 移动端 —— */
  @media (max-width: 640px) {
    header { padding: 14px 18px 10px; }
    header h1 { font-size: 24px; }
    header .sub { font-size: 12px; }
    header .logo-wrap { width: 72px; height: 72px; }

    /* panel 改为底抽屉：从右侧改为从底部弹起，更符合移动端常规
       max-height 78vh 给地球留出一截，让用户感觉两层共存 */
    #panel {
      top: auto;
      left: 0; right: 0; bottom: 0;
      width: 100%;
      max-width: 100%;
      max-height: 80vh;
      border-left: none;
      border-top: 3px solid var(--ink);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -6px 0 var(--shadow);
      transform: translateY(100%);
    }
    #panel.open { transform: translateY(0); }
    /* 手势条：4px 灰条暗示这是可拖动/可关闭的抽屉 */
    #panel::before {
      content: '';
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 44px; height: 4px;
      background: var(--ink-soft);
      border-radius: 2px;
      opacity: 0.6;
    }
    #panel-head {
      padding: 22px 18px 14px;  /* 顶部给手势条让位 */
    }
    /* 触控目标 ≥ 44px（WCAG / iOS HIG / Material 一致） */
    #panel button.icon {
      width: 44px; height: 44px;
      font-size: 20px;
    }
    .btn {
      min-height: 48px;  /* primary/ghost 按钮触控充足 */
      font-size: 17px;
    }

    /* hint 由 JS 在 panel 打开时主动隐藏（onLocationPicked/openTrips/openTrip）
       badge z-index:10 < panel z-index:20，自然被底抽屉覆盖 */

    .hint { font-size: 14px; padding: 10px 16px; bottom: 20px; }
    .badge { font-size: 12px; padding: 6px 10px; left: 14px; bottom: 14px; }

    /* toolbar 整体：右上角，更紧凑 */
    .toolbar {
      top: 92px;
      right: 14px;
      gap: 8px;
    }
    /* 所有 toolbar-item 子项触控高度 44px（WCAG/HIG） */
    .toolbar-item { height: 44px; }
    /* view-switch 内按钮缩字号 padding */
    .view-switch { padding: 3px; gap: 1px; }
    .view-switch button { padding: 0 8px; font-size: 12px; }
    /* trips-btn 缩小 padding */
    .trips-btn { padding: 0 10px; font-size: 13px; }
    .trips-btn > span:first-child { white-space: nowrap; }
    .trips-btn .count { padding: 1px 6px; font-size: 11px; }
    /* layer-toggle：移动端只留图标，省横向空间 */
    .layer-toggle { padding: 0; width: 44px; justify-content: center; }
    .layer-toggle .lt-label { display: none; }
    /* mobile-search-btn 也是 44 方形 */
    .mobile-search-btn { width: 44px; font-size: 16px; }

    #welcome-bubble {
      padding: 22px 20px 20px;
    }
    #welcome-bubble .wb-title { font-size: 19px; }
    #welcome-bubble .wb-body { font-size: 13px; }
    #welcome-bubble .wb-btn { min-height: 48px; padding: 12px 26px; }

    /* loading-peek 在小屏稍微紧凑 */
    .loading-peek { padding: 10px; gap: 8px; }
    .loading-peek .peek-thumb { width: 42px; height: 56px; }

    /* 小屏 toolbar 里 search-box 默认隐藏，让 mobile-search-btn 顶上 */
    .search-box { display: none; }
    .mobile-search-btn { display: flex; }
    /* 错误气泡默认隐藏，在搜索展开态时由下方规则接管 */
    .search-error {
      top: 80px;
      left: 14px;
      right: 14px;
      max-width: calc(100vw - 28px);
    }

    /* 搜索展开态：search-box 脱离 toolbar 流，跑去顶部全宽
       用 fixed override 父级 flex 布局，加 slideDown 动画 */
    body.mobile-search-open .search-box {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0;
      width: 100%;
      height: auto;
      background: var(--paper);
      border: none;
      border-bottom: 3px solid var(--ink);
      border-radius: 0;
      box-shadow: 0 6px 0 var(--shadow);
      padding: 14px;
      padding-top: max(14px, env(safe-area-inset-top, 14px));
      z-index: 50;
      gap: 10px;
      align-items: center;
      overflow: visible;
      animation: slideDownIn 0.28s cubic-bezier(.4,1.4,.5,1);
    }
    body.mobile-search-open .search-box input {
      flex: 1;
      width: auto;
      font-size: 16px;  /* >=16px 防 iOS Safari focus 时自动放大 */

<script>
//==================================================================
// 常量
//==================================================================
// 注意：图像生成 API Key 已不在前端持有，由 server.py 从 .env 注入。
// 前端任何 fetch 都 *不要* 携带 Authorization 头。
const API_URL = '/api/dmfox/v1/images/edits';

const REF_FILES = [
  'refs_compressed/表情包×5＋bot头像.jpg',
  'refs_compressed/寿司＋樱花.jpg',
  'refs_compressed/大树＋蒙古包.jpg',
  'refs_compressed/烧烤＋面包.jpg',
  'refs_compressed/做饭＋开饭.jpg',
  'refs_compressed/表情包×4.jpg',
];
const SIZE_CANDIDATES = ['1024x3072', '1024x2048', '1024x1536'];

// 基于真实 events.jsonl 的耗时分布设计（n=7，中位 221s，平均 229s，最慢 325s）
// 各阶段挑选 elapsed >= atSec 中最大的一项。sub 是副文案（小字、群体感）
// 故意承认"3-5 分钟"和"偶尔会画到 5 分半"——预期管理诚实第一
const LOADING_STAGES = [
  { atSec:   0, main: '栗栗熊在收拾画笔',  sub: '准备出发去 ${place}' },
  { atSec:  20, main: '栗栗熊飞到了 ${place}', sub: '正在物色当地食物' },
  { atSec:  60, main: '在街边晃了一圈',       sub: '挑出最值得画的几样' },
  { atSec: 120, main: '草稿打好了，开始上色', sub: '通常 3–5 分钟' },
  { atSec: 180, main: '颜料慢慢晕开',         sub: '大部分人都在这会儿等着' },
  { atSec: 240, main: '快画完了，大菜在最后', sub: '你已经等过中位数了，再坚持一下' },
  { atSec: 300, main: '栗栗熊画得很认真',     sub: '偶尔会画到 5 分半，再陪他一会儿' },
  { atSec: 360, main: '比预期稍长',           sub: '网络可能慢了一点，可以继续等' },
];

function pickLoadingStage(elapsedSec) {
  let chosen = LOADING_STAGES[0];
  for (const s of LOADING_STAGES) {
    if (elapsedSec >= s.atSec) chosen = s;
    else break;
  }
  return chosen;
}

function fmtMmSs(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

const HOME = { lat: 24.4346, lng: 118.0852, label: '厦门大学' };

// 高德 JS API Key + 安全密钥（v2 强制要求 securityJsCode；否则会
// 报 USERKEY_PLAT_NOMATCH 并降级 base tile / 关闭 3D 楼块等数据）
// 申请地址：https://console.amap.com/dev/key/app 同一应用下的「安全密钥」
const AMAP_KEY = '__AMAP_KEY__';
const AMAP_SECURITY_CODE = '__AMAP_SECURITY_CODE__';

// —— 状态/标识 ——
const TAB_ID = (function () {
  const arr = new Uint8Array(8);
  (window.crypto || window.msCrypto).getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
})();
const BUSY_KEY = 'lilibear.busy';
const BUSY_TTL_MS = 10 * 60 * 1000;  // 10 分钟过期自动解锁
const TRIPS_KEY = 'lilibear.trips';
const TRIPS_DB = 'lilibear_world';
const TRIPS_STORE = 'images';
const BC_NAME = 'lilibear';

//==================================================================
// XSS / 文本清洗工具
//==================================================================
function $(id) { return document.getElementById(id); }
function escText(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') node.className = attrs[k];
    else if (k === 'style') node.style.cssText = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') node.addEventListener(k.slice(2), attrs[k]);
    else node.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

//==================================================================
// 日志上报（best-effort，失败不阻塞）
//==================================================================
function logEvent(type, extra) {
  try {
    const payload = Object.assign({}, extra || {}, { type, tab_id: TAB_ID });
    fetch('/api/log/event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true,
    }).catch(() => {});
  } catch {}
}

async function logImageBlob(blob, meta) {
  try {
    const fd = new FormData();
    fd.append('image', blob, 'result.png');
    if (meta.lat != null) fd.append('lat', String(meta.lat));
    if (meta.lng != null) fd.append('lng', String(meta.lng));
    if (meta.size)        fd.append('size', meta.size);
    if (meta.trip_id)     fd.append('trip_id', meta.trip_id);
    if (meta.duration_sec != null) fd.append('duration_sec', String(meta.duration_sec));
    const r = await fetch('/api/log/image', { method: 'POST', body: fd });
    return r.ok ? (await r.json()) : null;
  } catch {
    return null;
  }
}

//==================================================================
// IndexedDB: 图片 Blob 存储
//==================================================================
function dbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(TRIPS_DB, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(TRIPS_STORE)) {
        db.createObjectStore(TRIPS_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(id, blob) {
  const db = await dbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(TRIPS_STORE, 'readwrite');
    tx.objectStore(TRIPS_STORE).put(blob, id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function dbGet(id) {
  const db = await dbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(TRIPS_STORE, 'readonly');
    const req = tx.objectStore(TRIPS_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function dbDel(id) {
  const db = await dbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(TRIPS_STORE, 'readwrite');
    tx.objectStore(TRIPS_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// 客户端缩略图：地球仪 marker 用 thumb，避免把 1MB 原图解码成 4MB RAM
// 大图仍存在 dbGet(id) 下，openTrip 看大图不退化
async function makeThumbBlob(blob, maxSide = 256, quality = 0.78) {
  try {
    const bmp = await createImageBitmap(blob);
    const ratio = Math.min(1, maxSide / Math.max(bmp.width, bmp.height));
    const w = Math.max(1, Math.round(bmp.width * ratio));
    const h = Math.max(1, Math.round(bmp.height * ratio));
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(bmp, 0, 0, w, h);
    if (bmp.close) bmp.close();
    return await new Promise((res) => cv.toBlob(res, 'image/jpeg', quality));
  } catch (e) {
    return null;
  }
}

async function dbPutWithThumb(id, blob) {
  await dbPut(id, blob);                                       // 大图（看大图用）
  const thumb = await makeThumbBlob(blob, 256, 0.78);
  if (thumb) await dbPut(id + ':thumb', thumb).catch(() => {}); // 缩略图（marker 用）
}

async function dbGetThumbOrFull(id) {
  // 优先 thumb，回退 full（兼容老 trip 没有 thumb）
  const t = await dbGet(id + ':thumb').catch(() => null);
  if (t) return t;
  return await dbGet(id).catch(() => null);
}

//==================================================================
// 机票夹元数据（localStorage）
//==================================================================
function tripsRead() {
  try {
    const raw = localStorage.getItem(TRIPS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function tripsWrite(list) {
  try { localStorage.setItem(TRIPS_KEY, JSON.stringify(list)); }
  catch (e) { console.warn('localStorage 写入失败', e); }
}
function tripsAdd(t) {
  const list = tripsRead();
  list.unshift(t);
  tripsWrite(list);
  refreshTripsCount();
}
async function tripsRemove(id) {
  tripsWrite(tripsRead().filter(t => t.id !== id));
  try { await dbDel(id); } catch {}
  try { await dbDel(id + ':thumb'); } catch {}    // 顺手清缩略图，避免 IDB 越长越大
  refreshTripsCount();
}
function refreshTripsCount() {
  const n = tripsRead().length;
  const el = $('trips-count');
  if (el) el.textContent = String(n);
}

//==================================================================
// 并发锁（同 origin 全局，跨标签页）
//==================================================================
let bc = null;
try { bc = new BroadcastChannel(BC_NAME); } catch {}

function busyGet() {
  try {
    const raw = localStorage.getItem(BUSY_KEY);
    if (!raw) return null;
    const v = JSON.parse(raw);
    if (!v || typeof v !== 'object') return null;
    if (!v.started_at || (Date.now() - v.started_at) > BUSY_TTL_MS) {
      // 过期视为无效
      localStorage.removeItem(BUSY_KEY);
      return null;
    }
    return v;
  } catch { return null; }
}
function busyClaim(meta) {
  // 如果当前 busy 已属本 tab，则合并字段（不重置 started_at），保留进行中任务的真实开始时间
  const prev = busyGet();
  const base = (prev && prev.tab_id === TAB_ID) ? prev : { tab_id: TAB_ID, started_at: Date.now() };
  const v = Object.assign({}, base, {
    lat: meta?.lat ?? base.lat ?? null,
    lng: meta?.lng ?? base.lng ?? null,
    trip_id: meta?.trip_id ?? base.trip_id ?? null,
    job_id: meta?.job_id ?? base.job_id ?? null,
  });
  localStorage.setItem(BUSY_KEY, JSON.stringify(v));
  if (bc) bc.postMessage({ type: 'busy', value: v });
  updateBusyUI(v);
}
function busyRelease() {
  const cur = busyGet();
  if (cur && cur.tab_id !== TAB_ID) return; // 别人的锁不释放
  localStorage.removeItem(BUSY_KEY);
  if (bc) bc.postMessage({ type: 'idle' });
  updateBusyUI(null);
}
function isBusyHere() {
  const v = busyGet();
  return !!(v && v.tab_id === TAB_ID);
}
function isBusyElsewhere() {
  const v = busyGet();
  return !!(v && v.tab_id !== TAB_ID);
}

function updateBusyUI(v) {
  const hint = $('hint');
  if (!hint) return;
  if (v && v.tab_id !== TAB_ID) {
    hint.classList.remove('hidden');
    hint.classList.add('busy');
    hint.textContent = '🛫 栗栗熊正在另一个标签页出差，请稍候再点';
  } else if (!v) {
    hint.classList.remove('busy');
    hint.textContent = '👉 缩放并点击地图，看栗栗熊去那里吃什么';
  }
  // 同步禁用确认按钮
  const goBtn = document.getElementById('go-btn');
  if (goBtn) goBtn.disabled = !!(v && v.tab_id !== TAB_ID);
}

// 跨标签页同步
window.addEventListener('storage', (e) => {
  if (e.key === BUSY_KEY) updateBusyUI(busyGet());
  if (e.key === TRIPS_KEY) {
    refreshTripsCount();
    redrawHistoryMarkers();
  }
});
if (bc) bc.onmessage = (ev) => {
  const d = ev.data;
  if (d && (d.type === 'busy' || d.type === 'idle')) updateBusyUI(busyGet());
  if (d && d.type === 'trips_changed') {
    refreshTripsCount();
    redrawHistoryMarkers();
  }
};

// 注意：以前的 pagehide 会自动 busyRelease，但现在任务在 server 端持续运行，
// 手机切走时 pagehide 也会触发——一旦释放锁，回来就以为没在做事，导致丢图。
// 因此这里不再释放：busy 在 BUSY_TTL_MS 内有效，下次打开会查 server 拿到当前 job 状态。
// 周期性兜底（万一锁过期但残留）
setInterval(() => {
  const v = busyGet();
  updateBusyUI(v);
}, 3000);

//==================================================================
// AMap 加载（仅 AMap，没有任何回退）
//==================================================================
function loadAmap() {
  return new Promise((resolve, reject) => {
    if (window.AMap) return resolve();
    if (!AMAP_KEY || AMAP_KEY.length < 16 || AMAP_KEY.startsWith('__')) {
      return reject(new Error('AMAP_KEY 未注入，请确认 .env 已配置并通过 server.py 启动'));
    }
    // 关键：securityJsCode 必须在 webapi.amap.com/maps 脚本之前设置，
    // 否则 v2 API 报 USERKEY_PLAT_NOMATCH，base tile 鉴权降级
    if (AMAP_SECURITY_CODE && !AMAP_SECURITY_CODE.startsWith('__')) {
      window._AMapSecurityConfig = { securityJsCode: AMAP_SECURITY_CODE };
    } else {
      console.warn('[AMap] AMAP_SECURITY_CODE 未配置，base tile 可能糊；请在 .env 加 AMAP_SECURITY_CODE');
    }
    const s = document.createElement('script');
    s.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(AMAP_KEY)}`;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('高德 SDK 加载失败（检查网络/Key）'));
    document.head.appendChild(s);
  });
}

//==================================================================
// 参考图预加载
//==================================================================
const refBlobs = [];
async function loadRefs() {
  for (const url of REF_FILES) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('参考图加载失败: ' + url);
    refBlobs.push(await r.blob());
  }
}

//==================================================================
// 地图
//==================================================================
let map;
let pendingMarker = null;
let pendingLatLng = null;
const historyMarkers = new Map(); // trip_id -> AMap.Marker
let homeMarker = null;
let satLayer = null;

function makePinDom(klass) {
  const e = document.createElement('div');
  e.className = klass;
  // 修复：marker DOM 的 mousedown 会冒泡到地图容器，AMap 误以为是地图拖动起手，
  // 导致松开鼠标后地图仍跟随鼠标移动（"粘鼠标"）。在源头阻断即可。
  const swallow = (ev) => { ev.stopPropagation(); };
  e.addEventListener('mousedown', swallow);
  e.addEventListener('touchstart', swallow, { passive: true });
  return e;
}

function initMap() {
  map = new AMap.Map('globe', {
    viewMode: '3D',
    pitch: 35,
    rotation: 0,
    zoom: 4,
    zooms: [3, 20],            // 提升最大缩放到 20，避免「拉最近还是糊一块」
    center: [HOME.lng, HOME.lat],
    mapStyle: 'amap://styles/normal',
    showBuildingBlock: true,
    skyColor: '#d9ebe8',
    features: ['bg', 'road', 'building', 'point'],
  });

  homeMarker = new AMap.Marker({
    position: [HOME.lng, HOME.lat],
    content: makePinDom('pin-home'),
    offset: new AMap.Pixel(0, 0),
    anchor: 'center',
    title: HOME.label + ' · 出发地',
    zIndex: 90,
  });
  homeMarker.setMap(map);

  map.on('click', (e) => {
    const lng = e.lnglat.getLng();
    const lat = e.lnglat.getLat();
    onLocationPicked({ lat, lng });
  });

  redrawHistoryMarkers();
  applyPublicLayer();   // 「全球足迹」默认开：进站即点亮全球散点
}

function switchView(view) {
  // 关键：不再二次调用 setMapStyle —— 初始化时已经设过 normal style，
  // 再次设置会触发 style URL 重新拉取，部分 key/网络环境下会导致底图空白。
  // 2D / 3D 仅在俯仰角上区分；卫星只在普通底图上叠加 satellite tile layer。
  if (view === '2D') {
    if (satLayer) { satLayer.setMap(null); satLayer = null; }
    map.setPitch(0, true, 400);
    map.setRotation(0, true, 400);
  } else if (view === '3D') {
    if (satLayer) { satLayer.setMap(null); satLayer = null; }
    map.setPitch(55, true, 400);   // 加大俯仰角，让 3D 和 2D 视觉差异明显
  } else if (view === 'satellite') {
    if (!satLayer) {
      satLayer = new AMap.TileLayer.Satellite();
      satLayer.setMap(map);
    }
    map.setPitch(35, true, 400);
  }
  document.querySelectorAll('.view-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  logEvent('view_switch', { view });
}

function addPendingMarker(lat, lng) {
  if (pendingMarker) { pendingMarker.setMap(null); pendingMarker = null; }
  pendingMarker = new AMap.Marker({
    position: [lng, lat],
    content: makePinDom('pin-pending'),
    anchor: 'center',
    offset: new AMap.Pixel(0, 0),
    zIndex: 100,
  });
  pendingMarker.setMap(map);
  pendingLatLng = { lat, lng };
}

function clearPending() {
  if (pendingMarker) { pendingMarker.setMap(null); pendingMarker = null; }
  pendingLatLng = null;
}

// 用 trip.id 给倾斜角度做"稳定随机"：同一个 trip 每次刷新角度不变，
// 避免视觉抖动（红色随机会让用户感觉地图在颤）
function _stableTilt(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
  // 映射到 -5..+5 度（含 0，避免常数倾斜）
  const t = ((h % 11) + 11) % 11 - 5;
  return t;
}

function makePhotoPin(trip) {
  const root = makePinDom('pin-photo');
  const tilt = _stableTilt(trip.id || (trip.lat + '_' + trip.lng));
  // 既要响应 hover 时把倾斜归零，又要保留初始倾斜 -> 用 inline 变量配 CSS
  root.style.transform = 'rotate(' + tilt + 'deg)';
  root.style.position = 'relative';  // 让 .pp-label 的 absolute 锚定在 pin 上
  root.title = trip.place_short || formatLatLng(trip.lat, trip.lng);

  const thumb = document.createElement('div');
  thumb.className = 'pp-thumb';
  const inner = document.createElement('div');
  inner.className = 'pp-inner';
  thumb.appendChild(inner);
  root.appendChild(thumb);

  // 异步加载缩略图：marker 用 thumb（~30KB）替代原图（~1MB），省 RAM
  // 失败也保留 polaroid 外壳（用户看到"正在显影"比看到红点更有期待感）
  dbGetThumbOrFull(trip.id).then((blob) => {
    if (!blob) return;
    const img = document.createElement('img');
    img.src = URL.createObjectURL(blob);
    img.alt = '';
    inner.appendChild(img);
  }).catch(() => {});

  // hover tooltip（地名）
  const label = document.createElement('div');
  label.className = 'pp-label';
  label.textContent = trip.place_short || formatLatLng(trip.lat, trip.lng);
  root.appendChild(label);

  return root;
}

//==================================================================
// 「全球墙」公开点图层：切到 feed tab 时显示所有公开图的散点，
// 让用户立刻感觉栗栗熊遍布全球。区别于个人 polaroid 用小橙点。
//==================================================================
const publicMarkers = [];
let _publicMarkersLoaded = false;
let _publicMarkersLoading = false;

async function loadPublicMarkers() {
  if (!map) return;
  if (_publicMarkersLoading) return;
  // 已加载过：直接显示
  if (_publicMarkersLoaded) {
    for (const m of publicMarkers) m.setMap(map);
    return;
  }
  _publicMarkersLoading = true;
  try {
    const r = await fetch('/api/feed/markers?limit=2000', {
      cache: 'no-store', credentials: 'same-origin',
    });
    if (!r.ok) return;
    const j = await r.json().catch(() => null);
    const items = (j && j.items) || [];
    for (const it of items) {
      if (typeof it.lat !== 'number' || typeof it.lng !== 'number') continue;
      const dot = document.createElement('div');
      dot.className = 'pin-public' + (it.is_mine ? ' is-mine' : '');
      dot.title = (it.place_short ? it.place_short + ' · ' : '')
        + (it.is_mine ? '你的足迹（点击看图）' : '栗栗熊到过这里（点击看图）');
      const m = new AMap.Marker({
        position: [it.lng, it.lat],
        content: dot,
        anchor: 'center',
        offset: new AMap.Pixel(0, 0),
        zIndex: 50,                          // 个人 polaroid 是 100+，公开点垫底
        bubble: false,                       // 自己处理 click，别冒泡成地图取点
      });
      // 点圆点 → 直接弹出当地生成的那张图（省得在全球墙里翻）
      m.on('click', (ev) => {
        if (ev && ev.originEvent) ev.originEvent.stopPropagation();
        openFeedItem({ ...it, visibility: 'public' });  // markers 仅含公开图
      });
      m.setMap(map);
      publicMarkers.push(m);
    }
    _publicMarkersLoaded = true;
  } catch (e) {
    // ignore — feed 是次要功能，挂了不该影响主流程
  } finally {
    _publicMarkersLoading = false;
  }
}

function clearPublicMarkers() {
  for (const m of publicMarkers) m.setMap(null);
}

// —— 「全球足迹」散点图层开关：默认开，状态记 localStorage ——
// 单一事实来源：图层显隐只由这个开关决定，不再跟着机票夹 tab 走。
const LAYER_KEY = 'lilibear.publicLayer.v1';
function publicLayerOn() {
  try {
    const v = localStorage.getItem(LAYER_KEY);
    return v === null ? true : v === '1';  // 默认开
  } catch { return true; }
}
function publicLayerWrite(on) {
  try { localStorage.setItem(LAYER_KEY, on ? '1' : '0'); } catch {}
}
// 按当前开关状态把散点图层显示 / 隐藏（loadPublicMarkers 自带「已加载则直接显示」）
function applyPublicLayer() {
  if (publicLayerOn()) loadPublicMarkers();
  else clearPublicMarkers();
}
// 同步开关按钮的视觉态（on 时 accent 实心）
function updateLayerToggleUI() {
  const btn = $('layer-toggle-btn');
  if (btn) btn.classList.toggle('on', publicLayerOn());
}

function redrawHistoryMarkers() {
  if (!map) return;
  // 清掉旧的
  for (const m of historyMarkers.values()) m.setMap(null);
  historyMarkers.clear();
  const trips = tripsRead();
  // 较新的 trip 给更高 zIndex，新机票漂在旧机票上面
  trips.forEach((t, idx) => {
    if (typeof t.lat !== 'number' || typeof t.lng !== 'number') return;
    const dom = makePhotoPin(t);
    const m = new AMap.Marker({
      position: [t.lng, t.lat],
      content: dom,
      anchor: 'bottom-center',  // polaroid 底边贴在经纬度上（像把照片"插"在地上）
      offset: new AMap.Pixel(0, 4),  // 微调让"插点"在卡片下沿稍下方
      zIndex: 100 + (trips.length - idx),  // 新的更高
      bubble: false,
    });
    m.on('click', (ev) => {
      if (ev && ev.originEvent) ev.originEvent.stopPropagation();
      openTrip(t.id);
    });
    m.setMap(map);
    historyMarkers.set(t.id, m);
  });
}

//==================================================================
// 点击 → 确认 → 生成
//==================================================================
// 当前 pending 坐标的地名 promise（点击瞬间触发，generate 时复用）
let _pendingPlacePromise = null;

function onLocationPicked({ lat, lng }) {
  if (isBusyElsewhere()) {
    flashBusyHint();
    return;
  }
  if (isBusyHere()) {
    // 自己正在生成 —— 让用户先等
    flashBusyHint();
    return;
  }
  logEvent('pick', { lat, lng });
  $('hint').classList.add('hidden');
  addPendingMarker(lat, lng);
  map.setZoomAndCenter(Math.max(map.getZoom(), 7), [lng, lat], false, 800);
  // 点击瞬间就开始解析地名，confirm 卡片可以异步增强
  _pendingPlacePromise = resolvePlace(lat, lng).catch(() => null);
  showConfirm(lat, lng);
}

function flashBusyHint() {
  const h = $('hint');
  h.classList.remove('hidden');
  h.classList.add('busy');
  h.textContent = '🛫 栗栗熊正在出差，请等当前生成完成';
}

function showConfirm(lat, lng) {
  $('where').innerHTML = '';
  $('where').appendChild(el('span', null, '栗栗熊要去哪儿？'));
  $('where').appendChild(el('small', null, '请确认目的地'));
  $('panel').classList.add('open');

  const body = $('panel-body');
  body.innerHTML = '';

  // 地名分两行展示：主标题 placeNode（地名）+ 副信息 coordNode（经纬度）
  // 三态：resolving（反查中）→ resolved（成功）→ unresolved（5s 超时兜底）
  const placeNode = el('div', { class: 'place-name resolving' }, '正在确认地点…');
  const coordNode = el('div', { class: 'coord-detail' }, formatLatLng(lat, lng));

  // 异步增强：reactToResolve 只在用户还停留在同一坐标时生效
  function reactToResolve(p) {
    if (!pendingLatLng || pendingLatLng.lat !== lat || pendingLatLng.lng !== lng) return;
    placeNode.classList.remove('resolving');
    if (p && p.place_short) {
      // 成功态：显示完整地名（"东京 · 日本" 或 "东京"），加 country 后缀让人一眼分辨海内外
      placeNode.textContent = p.place_short + (p.country && p.place_short.indexOf(p.country) < 0 ? ' · ' + p.country : '');
    } else {
      // 兜底态：坐标接管主信息
      placeNode.classList.add('unresolved');
      placeNode.textContent = '暂时叫不出名字';
    }
  }

  if (_pendingPlacePromise) {
    // 5s 兜底超时：避免反查卡死时一直挂着 "正在确认地点…"
    Promise.race([
      _pendingPlacePromise,
      new Promise((r) => setTimeout(() => r(null), 5000)),
    ]).then(reactToResolve, () => reactToResolve(null));
  } else {
    // 没有 pending promise（理论不应该到这），直接兜底
    reactToResolve(null);
  }

  const card = el('div', { class: 'confirm-card' },
    el('div', { class: 'mascot' }, el('img', { src: 'lilibear_logo.png', alt: '' })),
    el('div', { class: 'ask' }, '要去这里画一张美食地图吗？'),
    placeNode,
    coordNode,
    // 等待预期升级：从灰色 note 拎到独立的胶囊里，基于真实数据"3-5 分钟"
    el('div', { class: 'eta' }, '手绘需要 3-5 分钟'),
    el('div', { class: 'note' }, '单张约 1024×3072 长图'),
    buildFeedToggleRow(),
    el('div', { class: 'btn-row' },
      el('button', { class: 'btn primary', id: 'go-btn', type: 'button', onclick: onConfirmGo }, '出发！开始绘制'),
      el('button', { class: 'btn ghost', id: 'cancel-btn', type: 'button', onclick: onConfirmCancel }, '换个地方'),
    ),
  );
  body.appendChild(card);
  if (isBusyElsewhere()) $('go-btn').disabled = true;
}

// —— 全球墙：上传偏好（默认上传） ——
const FEED_PREF_KEY = 'lilibear.upload_to_feed.v1';
function feedPrefRead() {
  try {
    const v = localStorage.getItem(FEED_PREF_KEY);
    if (v === null) return true;  // 默认勾上
    return v === '1';
  } catch { return true; }
}
function feedPrefWrite(checked) {
  try { localStorage.setItem(FEED_PREF_KEY, checked ? '1' : '0'); } catch {}
}
function currentVisibility() {
  return feedPrefRead() ? 'public' : 'private';
}

// 确认面板上的"上传到全球墙"开关行；勾选状态从 localStorage 读
function buildFeedToggleRow() {
  const checked = feedPrefRead();
  const cb = el('input', { type: 'checkbox', id: 'feed-toggle' });
  cb.checked = checked;
  cb.addEventListener('change', () => feedPrefWrite(cb.checked));
  const lbl = el('label', { for: 'feed-toggle', class: 'feed-toggle-label' },
    cb,
    el('span', null, '上传到全球墙（其他人可以看到这张图）'),
  );
  return el('div', { class: 'feed-toggle-row' }, lbl);
}

function onConfirmGo() {
  if (!pendingLatLng) return;
  if (isBusyElsewhere() || isBusyHere()) {
    flashBusyHint();
    return;
  }
  const { lat, lng } = pendingLatLng;
  clearPending();
  generate(lat, lng);
}

function onConfirmCancel() {
  if (pendingLatLng) logEvent('cancel', pendingLatLng);
  clearPending();
  _pendingPlacePromise = null;
  $('panel').classList.remove('open');
  $('hint').classList.remove('hidden');
}

//==================================================================
// 地名解析：高德 Geocoder（国内）→ 后端 Nominatim 代理（海外）
//==================================================================
// v2: 双源并行决策（之前 v1 高德优先会把金门等地误判，旧缓存需失效）
const PLACE_CACHE_KEY = 'lilibear.places.v2';
const PLACE_CACHE_MAX = 200;

function placeCacheKey(lat, lng) {
  return lat.toFixed(2) + ',' + lng.toFixed(2);
}
function placeCacheRead() {
  try { return JSON.parse(localStorage.getItem(PLACE_CACHE_KEY) || '{}') || {}; }
  catch { return {}; }
}
function placeCacheWrite(obj) {
  try {
    const keys = Object.keys(obj);
    if (keys.length > PLACE_CACHE_MAX) {
      // 简单截断：保留最后写入的 PLACE_CACHE_MAX 条
      const trimmed = {};
      for (const k of keys.slice(-PLACE_CACHE_MAX)) trimmed[k] = obj[k];
      obj = trimmed;
    }
    localStorage.setItem(PLACE_CACHE_KEY, JSON.stringify(obj));
  } catch {}
}

// 高德 Geocoder 单例
let _amapGeocoderPromise = null;
function getAmapGeocoder() {
  if (_amapGeocoderPromise) return _amapGeocoderPromise;
  _amapGeocoderPromise = new Promise((resolve) => {
    if (!window.AMap) return resolve(null);
    try {
      AMap.plugin('AMap.Geocoder', () => {
        try { resolve(new AMap.Geocoder({ extensions: 'base' })); }
        catch { resolve(null); }
      });
    } catch { resolve(null); }
  });
  return _amapGeocoderPromise;
}

// 高德 addressComponent 字段在空时返回空数组 []，需要正规化
function _amapStr(v) { return Array.isArray(v) ? '' : (v || ''); }

async function resolveByAmap(lat, lng) {
  const g = await getAmapGeocoder();
  if (!g) return null;
  return new Promise((resolve) => {
    let done = false;
    const timer = setTimeout(() => { if (!done) { done = true; resolve(null); } }, 3500);
    try {
      g.getAddress([lng, lat], (status, result) => {
        if (done) return;
        done = true; clearTimeout(timer);
        if (status !== 'complete' || !result || !result.regeocode) return resolve(null);
        const rg = result.regeocode;
        const ac = rg.addressComponent || {};
        const province = _amapStr(ac.province);
        const city     = _amapStr(ac.city);
        const district = _amapStr(ac.district);
        const full     = _amapStr(rg.formattedAddress);
        // 高德海外坐标返回空 formatted_address，整体视为不可用，让上层走 Nominatim
        if (!province && !city && !district && !full) return resolve(null);
        const cityCore = (city || province).replace(/市$|省$|特别行政区$|自治区$/, '');
        let placeShort = '';
        if (cityCore && district) placeShort = cityCore + ' · ' + district;
        else if (cityCore)        placeShort = cityCore;
        else if (district)        placeShort = district;
        else if (province)        placeShort = province.replace(/省$/, '');
        if (!placeShort) return resolve(null);
        resolve({
          place_short: placeShort,
          country: '中国',
          state: province,
          city,
          district,
          full,
          source: 'amap',
        });
      });
    } catch { done = true; clearTimeout(timer); resolve(null); }
  });
}

async function resolveByServer(lat, lng) {
  try {
    const r = await fetch('/api/geocode?lat=' + encodeURIComponent(lat) + '&lng=' + encodeURIComponent(lng));
    if (!r.ok) return null;
    const j = await r.json();
    return (j && j.place_short) ? j : null;
  } catch { return null; }
}

// 主入口：返回 {place_short, country, state, city, district, full, source} 或 {place_short:''}
//
// 双源并行：高德对中国大陆精度最高（到区/街道），但海外/港澳台返回空或错误归属
//（例：金门 → 厦门）。Nominatim 全球准确但国内不如高德精细。
// 决策：以 Nominatim 的 country 为真值，仅当确认是「中国大陆」时优先用高德结果。
async function resolvePlace(lat, lng) {
  const ck = placeCacheKey(lat, lng);
  const cache = placeCacheRead();
  if (cache[ck]) return cache[ck];

  const SERVER_TIMEOUT = 6000;
  const [amap, server] = await Promise.all([
    resolveByAmap(lat, lng).catch(() => null),
    Promise.race([
      resolveByServer(lat, lng).catch(() => null),
      new Promise((r) => setTimeout(() => r(null), SERVER_TIMEOUT)),
    ]),
  ]);

  // 仅当 Nominatim 确认是中国大陆（且不是港澳台）时优先用高德
  const nominaCountry = server && server.country;
  const isMainlandCN = nominaCountry === '中国';

  let chosen;
  if (isMainlandCN && amap && amap.place_short) {
    chosen = amap;
  } else if (server && server.place_short) {
    chosen = server;
  } else if (amap && amap.place_short) {
    // 服务器没结果且高德有：通常是公共实例慢/失败，国内坐标也能用高德兜底
    chosen = amap;
  } else {
    chosen = { place_short: '', source: 'none' };
  }

  cache[ck] = chosen;
  placeCacheWrite(cache);
  return chosen;
}

//==================================================================
// 正向地名搜索（用现有 AMap.Geocoder.getLocation，无需后端 / 重启 server）
//==================================================================
// 已知局限：AMap 对中国大陆精度高（街道级），海外仅 "best effort"
// 后续后端加 Nominatim 正向搜索可补海外覆盖（要重启 server，目前避免）
async function searchPlace(query) {
  const q = (query || '').trim();
  if (!q) return null;
  const g = await getAmapGeocoder();
  if (!g) return null;
  return new Promise((resolve) => {
    let done = false;
    const timer = setTimeout(() => { if (!done) { done = true; resolve(null); } }, 5000);
    try {
      g.getLocation(q, (status, result) => {
        if (done) return;
        done = true; clearTimeout(timer);
        if (status !== 'complete' || !result || !result.geocodes || !result.geocodes.length) {
          return resolve(null);
        }
        // 取第一个匹配（高德按相关度排序，confidence 最高的在前）
        const top = result.geocodes[0];
        const loc = top.location;  // LngLat 实例
        if (!loc) return resolve(null);
        // LngLat 既支持 .getLng/.getLat 也有 .lng/.lat 属性，安全起见两个都试
        const lng = (typeof loc.getLng === 'function') ? loc.getLng() : loc.lng;
        const lat = (typeof loc.getLat === 'function') ? loc.getLat() : loc.lat;
        if (typeof lat !== 'number' || typeof lng !== 'number') return resolve(null);
        resolve({
          lat, lng,
          formatted: top.formattedAddress || q,
          level: top.level || '',   // "城市" / "区县" / "兴趣点" 等，有助于决定飞到的 zoom
        });
      });
    } catch { done = true; clearTimeout(timer); resolve(null); }
  });
}

//==================================================================
// 搜索框 UI 控制
//==================================================================
function showSearchError(msg) {
  const er = $('search-error');
  if (!er) return;
  er.textContent = msg;
  er.classList.add('visible');
  // 3s 后自动消失
  clearTimeout(window._searchErrTimer);
  window._searchErrTimer = setTimeout(() => er.classList.remove('visible'), 3000);
}
function hideSearchError() {
  const er = $('search-error');
  if (er) er.classList.remove('visible');
}

// 根据 AMap level 决定飞过去的 zoom（更聚焦的地点用更近的 zoom）
function pickZoomForLevel(level) {
  if (!level) return 8;
  if (level === '兴趣点' || level === '门牌号' || level === '地标性建筑') return 14;
  if (level === '道路' || level === '道路交叉路口') return 13;
  if (level === '区县' || level === '商圈') return 11;
  if (level === '城市') return 9;
  if (level === '省') return 6;
  return 8;
}

async function onSearchSubmit() {
  const input = $('search-input');
  const btn = $('search-go');
  if (!input || !btn) return;
  const q = input.value.trim();
  if (!q) return;
  // 并发禁止重复点击
  btn.classList.add('searching');
  btn.textContent = '搜索中…';
  hideSearchError();
  try {
    // busy 状态下也允许搜索（只飞过去，不触发生成）
    const hit = await searchPlace(q);
    if (!hit) {
      showSearchError('没找到「' + q + '」。试试更明确的名字（如「日本东京塔」）');
      return;
    }
    if (!map) return;
    // 飞过去（不立即触发 confirm，先让用户看到位置）
    const targetZoom = pickZoomForLevel(hit.level);
    map.setZoomAndCenter(Math.max(targetZoom, map.getZoom()), [hit.lng, hit.lat], false, 1200);
    // 移动端：搜索成功，关闭顶部搜索栏让用户看到地图飞行
    closeMobileSearch();
    // 飞行结束后弹出确认卡片（如果不忙）
    setTimeout(() => {
      if (isBusyElsewhere() || isBusyHere()) return;  // 正在生成时不打扰
      onLocationPicked({ lat: hit.lat, lng: hit.lng });
    }, 1250);
    logEvent('search', { query: q, lat: hit.lat, lng: hit.lng, level: hit.level });
  } finally {
    btn.classList.remove('searching');
    btn.textContent = '出发去';
  }
}

function formatLatLng(lat, lng) {
  const a = Math.abs(lat).toFixed(2) + '°' + (lat >= 0 ? 'N' : 'S');
  const b = Math.abs(lng).toFixed(2) + '°' + (lng >= 0 ? 'E' : 'W');
  return '(' + a + ', ' + b + ')';
}

// 统一展示：有地名时 "厦门 · 思明区 (24.44°N, 118.10°E)"，无地名时纯坐标
function formatLocation(place, lat, lng) {
  const coord = formatLatLng(lat, lng);
  const short = place && place.place_short;
  return short ? (short + ' ' + coord) : coord;
}

// 机票夹用：有地名只显示地名，没地名回落到经纬度
function placeOrCoord(trip) {
  return trip.place_short || formatLatLng(trip.lat, trip.lng);
}
