function genTripId() {
  const arr = new Uint8Array(6);
  (window.crypto || window.msCrypto).getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

// —— /api/jobs/* 任务系统：把"前端长 fetch"换成"server 后台跑 + 短轮询"。
// 设计目标：手机切走 / 锁屏 / 刷新都不丢图。
const JOB_POLL_INTERVAL_MS = 2500;
const JOB_POLL_MAX_GAP_MS  = 10 * 60 * 1000;  // 单次轮询累计静默超过 10 分钟视为失败兜底

async function generate(lat, lng) {
  const tripId = genTripId();
  busyClaim({ lat, lng, trip_id: tripId });
  // 等待地名 resolve（已在 onLocationPicked 触发）；最多等 2s，超时则纯坐标
  const placePromise = _pendingPlacePromise || resolvePlace(lat, lng).catch(() => null);
  _pendingPlacePromise = null;
  const place = await Promise.race([
    placePromise,
    new Promise((r) => setTimeout(() => r(null), 2000)),
  ]).catch(() => null);
  renderLoading(lat, lng, place);
  logEvent('generate_start', { lat, lng, trip_id: tripId });
  const prompt = buildPrompt(lat, lng, place);

  // 1) 向 server 发起任务（这一步还是 fetch；如果这一步失败说明本地服务没起来，直接报错）
  let jobId = null;
  try {
    const fd = new FormData();
    fd.append('model', 'gpt-image-2');
    fd.append('prompt', prompt);
    fd.append('sizes', JSON.stringify(SIZE_CANDIDATES));
    fd.append('n', '1');
    fd.append('tab_id', TAB_ID);
    fd.append('trip_id', tripId);
    fd.append('lat', String(lat));
    fd.append('lng', String(lng));
    fd.append('place_short', (place && place.place_short) || '');
    fd.append('place_full',  (place && place.full) || '');
    fd.append('visibility', currentVisibility());
    // 多张参考图：用 image0, image1 ... 命名（server 端按下标取，避免 multipart 同名覆盖）
    refBlobs.forEach((b, i) => fd.append('image' + i, b, 'ref' + i + '.jpg'));
    const r = await fetch('/api/jobs/start', { method: 'POST', body: fd });
    const j = await r.json().catch(() => null);
    if (!r.ok || !j || !j.job_id) {
      const msg = (j && j.error && j.error.message) || ('HTTP ' + r.status);
      throw new Error(msg);
    }
    jobId = j.job_id;
  } catch (e) {
    const msg = (e && e.message) || String(e);
    renderError(msg);
    logEvent('generate_fail', { lat, lng, trip_id: tripId, msg });
    busyRelease();
    return;
  }

  // 把 job_id 写进 busy 锁，便于刷新/切回后恢复
  busyClaim({ lat, lng, trip_id: tripId, job_id: jobId });

  // 2) 轮询直到 done/failed/cancelled
  await pollJobUntilDone({ jobId, tripId, lat, lng, place });
}

// 把"轮询 + 拿图 + 落盘 + 渲染"拆出来，generate() 和"启动恢复"都能用。
async function pollJobUntilDone({ jobId, tripId, lat, lng, place }) {
  let consecutiveFail = 0;
  let lastOkAt = Date.now();
  try {
    while (true) {
      await sleep(JOB_POLL_INTERVAL_MS);
      // 用户已在另一处取消（busy 锁被释放）→ 退出
      const cur = busyGet();
      if (!cur || cur.tab_id !== TAB_ID || cur.job_id !== jobId) return;

      let j = null;
      try {
        const r = await fetch('/api/jobs/' + jobId, { cache: 'no-store' });
        if (r.ok) {
          j = await r.json();
          consecutiveFail = 0;
          lastOkAt = Date.now();
        } else if (r.status === 404) {
          renderError('任务记录已过期或丢失');
          logEvent('generate_fail', { lat, lng, trip_id: tripId, msg: 'job 404' });
          busyRelease();
          return;
        } else {
          consecutiveFail++;
        }
      } catch {
        // 网络抖动：手机切走/锁屏时 fetch 抛错很常见，继续轮询。
        consecutiveFail++;
      }

      if (!j) {
        if (Date.now() - lastOkAt > JOB_POLL_MAX_GAP_MS) {
          renderError('连不上本地服务，已等待超过 10 分钟');
          logEvent('generate_fail', { lat, lng, trip_id: tripId, msg: 'poll silence' });
          busyRelease();
          return;
        }
        continue;
      }

      if (j.status === 'running' || j.status === 'queued') continue;

      if (j.status === 'cancelled') {
        renderError('任务已取消');
        busyRelease();
        return;
      }

      if (j.status === 'failed') {
        renderError(j.error || '生成失败');
        logEvent('generate_fail', { lat, lng, trip_id: tripId, msg: j.error || 'failed' });
        busyRelease();
        return;
      }

      if (j.status === 'done') {
        // 拉图片 blob（带重试）
        let blob = null;
        for (let i = 0; i < 3 && !blob; i++) {
          try {
            const ir = await fetch('/api/jobs/' + jobId + '/image', { cache: 'no-store' });
            if (ir.ok) blob = await ir.blob();
            else await sleep(800);
          } catch { await sleep(800); }
        }
        if (!blob) {
          renderError('图片下载失败');
          busyRelease();
          return;
        }
        await dbPutWithThumb(tripId, blob);
        const trip = {
          id: tripId,
          lat, lng,
          ts: Date.now(),
          size: j.size || '',
          duration_sec: Math.round(j.duration_sec || 0),
          place_short: (place && place.place_short) || j.place_short || '',
          place_full:  (place && place.full)        || j.place_full  || '',
        };
        tripsAdd(trip);
        if (bc) bc.postMessage({ type: 'trips_changed' });
        redrawHistoryMarkers();
        const blobUrl = URL.createObjectURL(blob);
        renderResult(blobUrl, trip);
        logEvent('generate_ok', { lat, lng, trip_id: tripId, size: trip.size, duration_sec: trip.duration_sec });
        busyRelease();
        return;
      }

      // 未知状态 → 兜底失败
      renderError('未知任务状态：' + j.status);
      busyRelease();
      return;
    }
  } catch (e) {
    renderError((e && e.message) || '生成失败');
    busyRelease();
  }
}

function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

async function cancelJobOnServer(jobId) {
  try {
    await fetch('/api/jobs/' + jobId + '/cancel', { method: 'POST', keepalive: true });
  } catch {}
}

// 启动时调用：本 tab 上次留下了 job_id（手机切走/锁屏/刷新）→ 接回去继续轮询
async function resumeBusyJobIfAny() {
  const v = busyGet();
  if (!v || v.tab_id !== TAB_ID) return;            // 没锁 / 别的 tab 的锁 → 不管
  if (!v.job_id) {
    // 旧版本残留：没 job_id 的 busy 不再有意义，清掉
    busyRelease();
    return;
  }
  // 先查 server 看任务到底什么状态
  let j = null;
  try {
    const r = await fetch('/api/jobs/' + v.job_id, { cache: 'no-store' });
    if (r.ok) j = await r.json();
    else if (r.status === 404) j = { status: 'missing' };
  } catch { /* 网络抖 → 当作 running 走轮询 */ }

  const status = (j && j.status) || 'running';
  if (status === 'done' || status === 'failed' || status === 'cancelled' || status === 'missing') {
    // 已结束：渲染对应 UI 然后释放
    if (status === 'done') {
      // 异步拿图、入库、渲染
      try {
        const ir = await fetch('/api/jobs/' + v.job_id + '/image', { cache: 'no-store' });
        if (ir.ok) {
          const blob = await ir.blob();
          const tripId = v.trip_id || genTripId();
          await dbPutWithThumb(tripId, blob);
          const trip = {
            id: tripId,
            lat: v.lat, lng: v.lng,
            ts: (j.finished_at ? Math.round(j.finished_at * 1000) : Date.now()),
            size: j.size || '',
            duration_sec: Math.round(j.duration_sec || 0),
            place_short: j.place_short || '',
            place_full:  j.place_full  || '',
          };
          // 不重复加入机票夹（如果用户在另一个 tab 已经入库过会有副本，但 trip_id 唯一所以无害）
          // 简单去重：tripsRead 里 id 已存在的话跳过
          if (!tripsRead().some(t => t.id === tripId)) {
            tripsAdd(trip);
            if (bc) bc.postMessage({ type: 'trips_changed' });
            redrawHistoryMarkers();
          }
          renderResult(URL.createObjectURL(blob), trip);
          logEvent('resume_done', { job_id: v.job_id, trip_id: tripId });
        } else {
          renderError('结果获取失败');
        }
      } catch {
        renderError('结果获取失败');
      }
    } else if (status === 'missing') {
      // server 已 GC 掉记录 —— 静默清状态即可（不打扰用户）
      logEvent('resume_missing', { job_id: v.job_id });
    } else {
      renderError(status === 'cancelled' ? '上次任务已取消' : ((j && j.error) || '生成失败'));
      logEvent('resume_terminal', { job_id: v.job_id, status });
    }
    busyRelease();
    return;
  }

  // 还在跑：恢复 loading UI，接管轮询
  logEvent('resume_running', { job_id: v.job_id });
  // place 信息可能 server 已经存了；没有也无所谓，renderLoading 会兜底成"远方"
  const place = (j && j.place_short) ? { place_short: j.place_short, full: j.place_full || '' } : null;
  // 异步去高德 / Nominatim 拿（如果 server 没存 place）
  if (!place) {
    resolvePlace(v.lat, v.lng).then((p) => {
      if (!p) return;
      // 若用户还在 loading 视图，刷一下文案
      const w = $('where');
      if (w && /正在生成/.test(w.textContent || '')) {
        w.innerHTML = '';
        w.appendChild(el('span', null, '栗栗熊在 ' + (p.place_short || formatLatLng(v.lat, v.lng))));
        w.appendChild(el('small', null, '正在生成美食地图…'));
      }
    }).catch(() => {});
  }
  renderLoading(v.lat, v.lng, place);
  pollJobUntilDone({
    jobId: v.job_id,
    tripId: v.trip_id || genTripId(),
    lat: v.lat, lng: v.lng,
    place,
  });
}

async function dataUrlOrUrlToBlob(s) {
  if (s.startsWith('data:')) {
    const r = await fetch(s);
    return await r.blob();
  }
  const r = await fetch(s);
  if (!r.ok) throw new Error('图片下载失败');
  return await r.blob();
}

//==================================================================
// 面板渲染
//==================================================================
function renderLoading(lat, lng, place) {
  const placeShort = (place && place.place_short) || '';
  const displayPlace = placeShort || '远方';

  $('where').innerHTML = '';
  $('where').appendChild(el('span', null, '栗栗熊在 ' + (placeShort || formatLatLng(lat, lng))));
  $('where').appendChild(el('small', null, '正在生成美食地图…'));

  const body = $('panel-body');
  body.innerHTML = '';

  const quipNode = el('div', { class: 'quip' },
    LOADING_STAGES[0].main.replace('${place}', displayPlace), el('span', { class: 'dots' }));
  const subQuipNode = el('div', { class: 'sub-quip' },
    LOADING_STAGES[0].sub.replace('${place}', displayPlace));
  const timerNode = el('div', { class: 'timer' }, '已用 ', el('span', { id: 'timer' }, '0:00'));

  const card = el('div', { class: 'loading-card' },
    el('div', { class: 'mascot' }, el('img', { src: 'lilibear_logo.png', alt: '' })),
    quipNode,
    subQuipNode,
    timerNode,
  );

  // 「上次画过的」缩略图：从机票夹抽 1 张（不抽当前正在画的、不抽自己）
  // 让等待时间不全空
  try {
    const trips = tripsRead().filter(t => t.lat !== lat || t.lng !== lng);
    if (trips.length > 0) {
      const peek = trips[Math.floor(Math.random() * Math.min(trips.length, 6))];
      const peekCard = el('div', { class: 'loading-peek' });
      const thumbBox = el('div', { class: 'peek-thumb' });
      // 异步加载缩略图（IndexedDB）
      dbGet(peek.id).then((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        thumbBox.appendChild(el('img', { src: url, alt: '' }));
      }).catch(() => {});
      peekCard.appendChild(thumbBox);
      peekCard.appendChild(el('div', { class: 'peek-text' },
        el('div', { class: 'peek-label' }, '边等边看：上次画的'),
        el('div', null, peek.place_short || '一个角落'),
        el('div', { class: 'peek-place' }, formatLatLng(peek.lat, peek.lng)),
      ));
      card.appendChild(peekCard);
    }
  } catch {}

  body.appendChild(card);

  // 定时器：每秒驱动文案和计时
  const t0 = Date.now();
  let lastStageIdx = 0;
  if (window._timerId) clearInterval(window._timerId);
  window._timerId = setInterval(() => {
    const timerEl = $('timer');
    const quipEl = body.querySelector('.quip');
    const subEl = body.querySelector('.sub-quip');
    if (!timerEl || !quipEl) { clearInterval(window._timerId); return; }
    const elapsed = Math.floor((Date.now() - t0) / 1000);
    timerEl.textContent = fmtMmSs(elapsed);

    const stage = pickLoadingStage(elapsed);
    const stageIdx = LOADING_STAGES.indexOf(stage);
    if (stageIdx !== lastStageIdx) {
      // 文案切换：先淡出再淡入，避免突变
      quipEl.classList.add('fading');
      if (subEl) subEl.classList.add('fading');
      setTimeout(() => {
        quipEl.innerHTML = '';
        quipEl.appendChild(document.createTextNode(stage.main.replace('${place}', displayPlace)));
        quipEl.appendChild(el('span', { class: 'dots' }));
        quipEl.classList.remove('fading');
        if (subEl) {
          subEl.textContent = stage.sub.replace('${place}', displayPlace);
          subEl.classList.remove('fading');
        }
      }, 280);
      lastStageIdx = stageIdx;
    }

    // > 360s 显示"可以取消重试"暗示（不强迫，给出路）
    if (elapsed > 360 && !card.querySelector('.cancel-hint')) {
      card.appendChild(el('div', { class: 'cancel-hint' },
        '等久了？',
        el('a', { href: '#', onclick: (e) => { e.preventDefault();
          if (confirm('确定取消并换一个地方？已经生成的进度会丢失。')) {
            const cur = busyGet();
            if (cur && cur.job_id) cancelJobOnServer(cur.job_id);
            try { busyRelease(); } catch {}
            if (window._timerId) { clearInterval(window._timerId); window._timerId = null; }
            onConfirmCancel();
          }
        }}, '取消重试'),
      ));
    }
  }, 1000);
  // 不再需要随机 QUIPS 切换的 _quipId 定时器（stage 驱动）
  if (window._quipId) { clearInterval(window._quipId); window._quipId = null; }
}

function renderResult(blobUrl, trip) {
  if (window._timerId) clearInterval(window._timerId);
  if (window._quipId) clearInterval(window._quipId);

  // trip 里已经有 place_short / place_full（generate 时注入）

  body.appendChild(el('img', {
    class: 'result-img',
    src: blobUrl,
    alt: '栗栗熊在 ' + placeText + ' 的美食地图',
  }));

  // —— 三按钮 CTA：完成态高峰情绪期，给三个出口避免用户直接关页面 ——
  const shareText = '我让栗栗熊去了' + placeText + '，画了张当地美食地图 🌍 你也试试';

  }, '🌍 看看全球墙');

  // 兜底：保留下载链接，老用户仍可直接保存

  }, '直接下载');
  body.appendChild(el('div', { class: 'result-meta' },
    '右键图片可保存 · ', dl, ' · ',
    el('a', { href: '#', onclick: (e) => { e.preventDefault(); openTrips(); } }, '回到机票夹')));
}

// —— 分享：navigator.share 优先；微信内嵌走"右上角 ⋯"提示；其它走剪贴板 ——
function isInWeChat() {
  return /MicroMessenger/i.test(navigator.userAgent || '');
}

async function shareNow(text) {
  const url = location.origin + '/';
  if (navigator.share) {
    try {
      await navigator.share({ title: '栗栗熊环游世界', text, url });
      logEvent('share_click', { method: 'system_share' });
      return;
    } catch (e) {
      // 用户取消或权限失败 → 走兜底
    }
  }
  if (isInWeChat()) {
    alert('点击右上角 ⋯ → 分享给朋友 / 分享到朋友圈');
    logEvent('share_click', { method: 'wechat_hint' });
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    alert('链接已复制：' + url);
    logEvent('share_click', { method: 'clipboard' });
  } catch {
    prompt('复制下方链接发给朋友：', url);
    logEvent('share_click', { method: 'prompt' });
  }
}

function renderError(msg) {
  if (window._timerId) clearInterval(window._timerId);

  $('where').innerHTML = '';
  $('where').appendChild(document.createTextNode('栗栗熊迷路了'));

  const body = $('panel-body');
  body.innerHTML = '';
  body.appendChild(el('div', { class: 'err' }, String(msg)));
}

function fmtTime(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
       + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

let _currentTripsTab = 'mine';  // 'mine' | 'feed'

async function openTrips() {
  renderTripsPanel(_currentTripsTab);
}

function renderTripsPanel(tab) {
  _currentTripsTab = tab;
  $('panel').classList.add('open');
  $('hint').classList.add('hidden');
  $('where').innerHTML = '';
  $('where').appendChild(document.createTextNode(tab === 'mine' ? '🎫 机票夹' : '🌍 全球墙'));
  $('where').appendChild(el('small', null,
    tab === 'mine' ? '点开任意一张回看，× 删除' : '所有人画过的地方'
  ));
  const body = $('panel-body');
  body.innerHTML = '';
  body.appendChild(buildTripsTabs());
  if (tab === 'mine') {
    renderMineList(body);
  } else {
    renderFeedList(body);
  }
  // 散点图层显隐由「全球足迹」开关统一管，不再跟着 tab 切换
  logEvent(tab === 'mine' ? 'open_trips' : 'open_feed', {});
}

function buildTripsTabs() {
  const wrap = el('div', { class: 'trips-tabs' });
  const mkTab = (name, label) => {
    const b = el('button', {
      class: 'trips-tab' + (_currentTripsTab === name ? ' active' : ''),
      type: 'button',
      onclick: () => renderTripsPanel(name),
    }, label);
    return b;
  };
  wrap.appendChild(mkTab('mine', '🎫 我的'));
  wrap.appendChild(mkTab('feed', '🌍 全球墙'));
  return wrap;
}

function renderMineList(body) {
  const list = tripsRead();
  if (!list.length) {
    body.appendChild(el('div', { class: 'trips-empty' },
      '还没有行程，去地图上点一个地方吧 ✈️'));
    return;
  }
  for (const t of list) {
    const card = el('div', { class: 'trip-card', onclick: () => openTrip(t.id) });
    const thumb = el('div', { class: 'thumb' });
    card.appendChild(thumb);
    const latlngNode = el('div', { class: 'latlng' }, placeOrCoord(t));
    card.appendChild(el('div', { class: 'meta' },
      latlngNode,
      el('div', { class: 'when' }, fmtTime(t.ts) + ' · ' + (t.size || '') + ' · ' + (t.duration_sec || '?') + 's'),
    ));
    card.appendChild(el('button', {
      class: 'del', title: '删除',
      onclick: async (e) => { e.stopPropagation(); await tripsRemove(t.id); openTrips(); redrawHistoryMarkers(); },
    }, '×'));
    body.appendChild(card);
    dbGet(t.id).then(blob => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      thumb.appendChild(el('img', { src: url, alt: '' }));
    });
  }
}

// —— 全球墙：拉 /api/feed 分页渲染 ——
function renderFeedList(body) {
  const grid = el('div', { class: 'feed-grid', id: 'feed-grid' });
  const lm = el('div', { class: 'feed-loadmore-row', id: 'feed-loadmore-row' });
  body.appendChild(grid);
  body.appendChild(lm);

  let cursor = null;
  let loading = false;
  let stopped = false;

  async function loadMore() {
    if (loading || stopped) return;
    loading = true;
    lm.innerHTML = '';
    lm.appendChild(el('div', { class: 'feed-loading' }, '加载中…'));
    let url = '/api/feed?limit=20';
    if (cursor != null) url += '&cursor=' + encodeURIComponent(cursor);
    try {
      const r = await fetch(url, { cache: 'no-store', credentials: 'same-origin' });
      const j = await r.json();
      // 切走了？放弃挂载
      if (_currentTripsTab !== 'feed' || !document.getElementById('feed-grid')) { stopped = true; return; }
      for (const it of (j.items || [])) {
        grid.appendChild(buildFeedCard(it));
      }
      cursor = j.next_cursor;
      lm.innerHTML = '';
      if (cursor == null) {
        const total = grid.children.length;
        if (total === 0) {
          // 完全空：友好提示
          body.removeChild(grid);
          body.removeChild(lm);
          body.appendChild(el('div', { class: 'trips-empty' },
            '🌍 墙上还没图，去画第一张吧'));
          stopped = true;
          return;
        }
        lm.appendChild(el('div', { class: 'feed-end' }, '— 到底了 —'));
      } else {
        const btn = el('button', { class: 'feed-loadmore', type: 'button' }, '看更多');
        btn.onclick = loadMore;
        lm.appendChild(btn);
      }
    } catch (e) {
      if (stopped) return;
      lm.innerHTML = '';
      const errNode = el('div', { class: 'feed-err' }, '加载失败，点击重试');
      errNode.onclick = loadMore;
      lm.appendChild(errNode);
    } finally {
      loading = false;
    }
  }
  loadMore();
}

function buildFeedCard(it) {
  const card = el('div', { class: 'feed-card', onclick: () => openFeedItem(it) });
  const thumb = el('div', { class: 'thumb' });
  thumb.appendChild(el('img', {
    src: '/api/feed/thumb/' + it.id,         // 缩略图：长边 320 / jpeg 78 / ~30-80KB
    loading: 'lazy',
    decoding: 'async',
    alt: '',
  }));
  card.appendChild(thumb);
  const place = it.place_short || (it.lat != null ? formatLatLng(it.lat, it.lng) : '某处');
  const who = it.author_nickname || '匿名旅人';
  const when = fmtTime((it.created_at || 0) * 1000);
  card.appendChild(el('div', { class: 'feed-meta' },
    el('div', { class: 'feed-place' }, place),
    el('div', { class: 'feed-author' }, '@' + who + (it.is_mine ? ' · 你' : '')),
    el('div', { class: 'feed-when' }, when),
  ));
  if (it.is_mine && it.visibility === 'private') {
    card.appendChild(el('div', { class: 'feed-private' }, '🔒 仅自己'));
  }
  return card;
}

function openFeedItem(it) {
  $('panel').classList.add('open');
  $('hint').classList.add('hidden');
  const place = it.place_short || (it.lat != null ? formatLatLng(it.lat, it.lng) : '某处');
  const who = it.author_nickname || '匿名旅人';
  $('where').innerHTML = '';
  $('where').appendChild(document.createTextNode('🌍 ' + place));
  $('where').appendChild(el('small', null,
    '@' + who + (it.is_mine ? '（你）' : '') + ' · ' + fmtTime((it.created_at || 0) * 1000)));
  const body = $('panel-body');
  body.innerHTML = '';
  body.appendChild(el('img', { class: 'result-img', src: '/api/feed/image/' + it.id, alt: '' }));

  const meta = el('div', { class: 'result-meta' });
  // 在地图上看
  const goMap = el('a', { href: '#' }, '在地图上看');
  goMap.onclick = (e) => {
    e.preventDefault();
    if (map && it.lat != null && it.lng != null) {
      map.setZoomAndCenter(Math.max(map.getZoom(), 6), [it.lng, it.lat], false, 600);
      $('panel').classList.remove('open');
      if (!busyGet()) $('hint').classList.remove('hidden');
    }
  };
  meta.appendChild(goMap);
  meta.appendChild(document.createTextNode(' · '));
  const back = el('a', { href: '#' }, '回到全球墙');
  back.onclick = (e) => { e.preventDefault(); renderTripsPanel('feed'); };
  meta.appendChild(back);

  // 自己的图：可切 visibility
  if (it.is_mine) {
    meta.appendChild(document.createTextNode(' · '));
    const tog = el('a', { href: '#' }, it.visibility === 'public' ? '改为私有' : '改为公开');
    tog.onclick = async (e) => {
      e.preventDefault();
      const newV = it.visibility === 'public' ? 'private' : 'public';
      try {
        const r = await fetch('/api/feed/' + it.id + '/visibility', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ visibility: newV }),
          credentials: 'same-origin',
        });
        const j = await r.json().catch(() => null);
        if (!r.ok) throw new Error((j && j.error && j.error.message) || 'HTTP ' + r.status);
        it.visibility = newV;
        tog.textContent = newV === 'public' ? '改为私有' : '改为公开';
        logEvent('visibility_changed', { id: it.id, to: newV });
      } catch (err) {
        alert((err && err.message) || '改失败');
      }
    };
    meta.appendChild(tog);
  }
  body.appendChild(meta);
}

async function openTrip(id) {
  const list = tripsRead();
  const trip = list.find(t => t.id === id);
  if (!trip) return openTrips();
  $('panel').classList.add('open');
  $('hint').classList.add('hidden');
  $('where').innerHTML = '';
  $('where').appendChild(document.createTextNode('栗栗熊到过 ' + placeOrCoord(trip)));
  $('where').appendChild(el('small', null, fmtTime(trip.ts) + ' · ' + (trip.size || '') + ' · ' + (trip.duration_sec || '?') + 's'));
  const body = $('panel-body');
  body.innerHTML = '';
  const blob = await dbGet(id);
  if (!blob) {
    body.appendChild(el('div', { class: 'err' },
      '图片找不到了（可能换浏览器或清过 IndexedDB）。'));
    return;
  }
  const url = URL.createObjectURL(blob);
  body.appendChild(el('img', { class: 'result-img', src: url, alt: '' }));
  const dl = el('a', {
    href: url,
    download: '栗栗熊_' + trip.lat.toFixed(2) + '_' + trip.lng.toFixed(2) + '.png',
  }, '直接下载');
  body.appendChild(el('div', { class: 'result-meta' },
    '右键图片可保存 · ', dl, ' · ',
    el('a', { href: '#', onclick: (e) => { e.preventDefault(); openTrips(); } }, '回到列表')));
  // 把地图也飞过去
  if (map) {
    map.setZoomAndCenter(Math.max(map.getZoom(), 6), [trip.lng, trip.lat], false, 600);
  }
  logEvent('open_trip', { trip_id: id, lat: trip.lat, lng: trip.lng });

  // 历史 trip 修复：v1 时期 place_short 可能是错的（如金门被误判为厦门）。
  // 异步重解析一次，若与现存不一致则回写并刷新当前展示。
  resolvePlace(trip.lat, trip.lng).then((p) => {
    const fresh = (p && p.place_short) || '';
    if (fresh === (trip.place_short || '')) return;
    const all = tripsRead();
    const idx = all.findIndex((x) => x.id === id);
    if (idx < 0) return;
    all[idx].place_short = fresh;
    all[idx].place_full = (p && p.full) || all[idx].place_full || '';
    tripsWrite(all);
    // 如果用户还在这张 trip 的视图上，刷新 where 文案
    const w = $('where');
    if (w && /栗栗熊到过/.test(w.textContent || '')) {
      const refreshed = { ...trip, place_short: fresh };
      w.innerHTML = '';
      w.appendChild(document.createTextNode('栗栗熊到过 ' + placeOrCoord(refreshed)));
      w.appendChild(el('small', null, fmtTime(trip.ts) + ' · ' + (trip.size || '') + ' · ' + (trip.duration_sec || '?') + 's'));
    }
  }).catch(() => {});
}

const WELCOME_KEY = 'lilibear.welcomed.v1';
function showWelcomeIfFirstTime() {
  try {
    if (localStorage.getItem(WELCOME_KEY)) return;
  } catch { return; }  // 隐私模式 localStorage 不可用 —— 直接跳过
  // 不挡 boot 动画，错开 600ms 让 boot 先渐隐
  setTimeout(() => {
    const bubble = $('welcome-bubble');
    const veil = $('welcome-veil');
    if (!bubble || !veil) return;
    bubble.classList.add('visible');
    veil.classList.add('visible');
    // 隐藏底部的 hint 气泡（避免重复信息）
    $('hint').classList.add('hidden');
    // 异步拉社会证明（公开点数）；新手 boot 慢一点没关系，统计行后到也不影响主气泡渲染
    fetchAndShowSocialProof();
  }, 600);
}

// 拉公开点数填到 welcome-stat。少于阈值就不展示，避免显得冷清。
async function fetchAndShowSocialProof() {
  const stat = $('welcome-stat');
  if (!stat) return;
  try {
    const r = await fetch('/api/feed/markers?limit=2000', { cache: 'no-store', credentials: 'same-origin' });
    if (!r.ok) return;
    const j = await r.json().catch(() => null);
    const n = (j && j.items && j.items.length) || 0;
    if (n < 5) return;                    // 太少则隐藏，避免社会证明反向奏效
    const have = $('welcome-stat-have');
    const next = $('welcome-stat-next');
    if (have) have.textContent = n;
    if (next) next.textContent = n + 1;
    stat.hidden = false;
  } catch (e) {
    // 静默失败 —— 没拉到就不展示
  }
}
function dismissWelcome() {
  const bubble = $('welcome-bubble');
  const veil = $('welcome-veil');
  if (!bubble) return;
  bubble.classList.remove('visible');
  bubble.classList.add('gone');
  veil.classList.remove('visible');
  // 写 localStorage，下次不再出现
  try { localStorage.setItem(WELCOME_KEY, '1'); } catch {}
  // 让用户看到底部 hint 气泡（继续引导"点地球"）
  setTimeout(() => {
    if (!busyGet()) $('hint').classList.remove('hidden');
  }, 350);
  logEvent('welcome_dismissed', {});
}
$('welcome-go').onclick = dismissWelcome;
$('welcome-veil').onclick = dismissWelcome;

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('welcome-bubble').classList.contains('visible')) {
    dismissWelcome();
  }
});

async function trySaveNicknameFromInput() {
  const err = $('nick-err');
  const v = ($('nick-input').value || '').trim();
  if (!v) { err.textContent = '名字不能空着'; return; }
  if (v.length > 16) { err.textContent = '名字不要超过 16 个字符'; return; }
  if (/[<>"']/.test(v)) { err.textContent = '不能包含 < > " \' 这些字符'; return; }
  try {
    await saveNickname(v);
    err.textContent = '';
    hideNicknameModal();
    logEvent('nick_set', { len: v.length });
  } catch (e) {
    err.textContent = (e && e.message) || '保存失败';
  }
}

$('nick-save').onclick = trySaveNicknameFromInput;
$('nick-skip').onclick = () => {
  try { localStorage.setItem(NICK_SKIP_KEY, '1'); } catch {}
  hideNicknameModal();
  logEvent('nick_skipped', {});
};
$('nick-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); trySaveNicknameFromInput(); }
  if (e.key === 'Escape') {
    // 强制弹窗（用户主动改名）允许 Esc 关闭；首次引导也允许，等同 skip
    if ($('nick-bubble').dataset.force === '1') {
      hideNicknameModal();
    } else {
      try { localStorage.setItem(NICK_SKIP_KEY, '1'); } catch {}
      hideNicknameModal();
    }
  }
});
$('nick-veil').onclick = () => {
  // 点遮罩关闭，等同 skip（不强制要昵称）
  if ($('nick-bubble').dataset.force !== '1') {
    try { localStorage.setItem(NICK_SKIP_KEY, '1'); } catch {}
  }
  hideNicknameModal();
};

// 启动时：拉 /api/me，没昵称且没 skip 过 → 弹一次
async function bootstrapMe() {
  await fetchMe();
  if (_me && !_me.nickname) {
    let skipped = false;
    try { skipped = localStorage.getItem(NICK_SKIP_KEY) === '1'; } catch {}
    if (!skipped) {
      // 让欢迎弹窗先（如果显示了），错开几秒
      setTimeout(() => {
        // 仅当没有其它 modal 占用时弹
        if (!$('welcome-bubble').classList.contains('visible')) {
          showNicknameModal({ force: false });
        } else {
          // 等欢迎气泡关闭后再弹
          const t = setInterval(() => {
            if (!$('welcome-bubble').classList.contains('visible')) {
              clearInterval(t);
              showNicknameModal({ force: false });
            }
          }, 400);
        }
      }, 800);
    }
  }
}
document.querySelectorAll('.view-switch button').forEach(b => {
  b.onclick = () => switchView(b.dataset.view);
});

//==================================================================
// 启动
//==================================================================
(async function main() {
  try {
    refreshTripsCount();
    updateBusyUI(busyGet());
    await Promise.all([loadRefs(), loadAmap()]);
    initMap();
    logEvent('boot_ok', {});
    setTimeout(() => $('boot').classList.add('gone'), 800);
    // boot OK 后，错开几百毫秒展示欢迎气泡（首次访问才显示）
    showWelcomeIfFirstTime();
    // 恢复正在跑的任务：手机切走/锁屏/刷新后，server 端任务可能还在继续。
    // 拿 localStorage 里上次的 busy 信息 + job_id 去 server 拉状态。
    resumeBusyJobIfAny();
    // 拉当前用户信息；首次访问无昵称时引导弹窗
    bootstrapMe();
  } catch (e) {
    $('boot').innerHTML = '';
    $('boot').appendChild(el('div',
      { style: 'color:#b8451f;font-family:\'ZCOOL KuaiLe\',sans-serif;font-size:18px;text-align:center;padding:0 20px' },
      '启动失败',
      el('br'),
      el('span', { style: 'font-family:monospace;font-size:13px' }, (e && e.message) || String(e)),
    ));
    logEvent('boot_fail', { msg: (e && e.message) || String(e) });
    console.error(e);
  }
})();
</script>
